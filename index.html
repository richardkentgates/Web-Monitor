<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WordPress Monitor</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-red: #3f1d1d;
      --border: #334155;
      --border-red: #7f1d1d;
      --accent: #3b82f6;
      --accent-soft: rgba(59,130,246,0.15);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --radius: 8px;
      --shadow: 0 4px 12px rgba(0,0,0,0.25);
    }

    body {
      font-family: system-ui, sans-serif;
      max-width: 1400px;
      margin: 20px auto;
      padding: 10px;
      background: #0f172a;
      color: var(--text);
    }

    h1 {
      margin-bottom: 5px;
      font-size: 20px;
      font-weight: 600;
      color: var(--accent);
    }

    input, button {
      padding: 6px 8px;
      margin: 3px 0;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      font-size: 13px;
    }

    button {
      cursor: pointer;
      background: var(--accent);
      border: none;
      color: white;
      font-weight: 500;
      box-shadow: 0 4px 10px rgba(37,99,235,0.35);
      transition: 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(37,99,235,0.45);
    }

    #countdown {
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 14px;
      color: var(--accent);
    }

    #sites {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .site {
      background: var(--panel);
      padding: 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      min-height: 150px;
      transition: background 0.2s, border 0.2s;
    }

    .site.unreachable {
      background: var(--panel-red);
      border-color: var(--border-red);
    }

    .site strong {
      font-size: 13px;
      color: var(--accent);
      word-break: break-all;
    }

    .status {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .last-check {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .remove-btn, .history-btn {
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 6px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 11px;
      margin-top: 6px;
      transition: 0.15s ease;
    }

    .history-panel {
      margin-top: 6px;
      padding: 6px;
      background: #0f172a;
      border-radius: 5px;
      border: 1px solid var(--border);
      max-height: 100px;
      overflow-y: auto;
      font-size: 11px;
      display: none;
    }

    .history-entry {
      margin-bottom: 4px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<h1>WordPress Monitor</h1>

<button id="notifBtn" onclick="enableNotifications()">Enable Notifications</button>

<div id="notifStatus" style="margin: 6px 0; color: var(--text-muted); font-size: 13px;">
  Notifications: <strong>Unknown</strong>
</div>

<div id="countdown">Next check in: 60s</div>

<input id="urlInput" type="url" placeholder="https://example.com" style="width:55%">
<button onclick="addSite()">Add</button>

<button onclick="exportSites()">Export</button>
<button onclick="importSites()">Import</button>
<input id="importFile" type="file" accept="application/json" style="display:none">

<div id="sites"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const POLL_INTERVAL = 60;
  const MAX_HISTORY = 20;
  let countdown = POLL_INTERVAL;

  function hideNotifButtonIfEnabled() {
    if (Notification.permission === "granted") {
      document.getElementById("notifBtn").style.display = "none";
    }
  }

  function enableNotifications() {
    const statusEl = document.getElementById("notifStatus");
    statusEl.innerHTML = `Notifications: <strong>Waiting…</strong>`;

    Notification.requestPermission().then(permission => {
      if (permission === "granted") {
        statusEl.innerHTML = `Notifications: <strong style="color:#4ade80">Enabled</strong>`;
        hideNotifButtonIfEnabled();
      } else if (permission === "denied") {
        statusEl.innerHTML = `Notifications: <strong style="color:#f87171">Blocked</strong>`;
      } else {
        statusEl.innerHTML = `Notifications: <strong>Not enabled</strong>`;
      }
    });
  }

  function updateNotificationStatus() {
    const statusEl = document.getElementById("notifStatus");

    if (Notification.permission === "granted") {
      statusEl.innerHTML = `Notifications: <strong style="color:#4ade80">Enabled</strong>`;
    } else if (Notification.permission === "denied") {
      statusEl.innerHTML = `Notifications: <strong style="color:#f87171">Blocked</strong>`;
    } else {
      statusEl.innerHTML = `Notifications: <strong>Not enabled</strong>`;
    }

    hideNotifButtonIfEnabled();
  }

  updateNotificationStatus();

  // Normalize site objects so render never crashes
  const rawSites = JSON.parse(localStorage.getItem("sites") || "[]");
  const sites = rawSites.map(s => ({
    url: s.url,
    status: s.status || "Not checked yet",
    responseTime: s.responseTime || "N/A",
    lastChecked: s.lastChecked || "Never",
    history: Array.isArray(s.history) ? s.history : []
  }));

  function save() {
    localStorage.setItem("sites", JSON.stringify(sites));
    render();
  }

  function addSite() {
    const url = document.getElementById("urlInput").value.trim();
    if (!url) return;
    sites.push({
      url,
      status: "Not checked yet",
      responseTime: "N/A",
      lastChecked: "Never",
      history: []
    });
    save();
  }

  function removeSite(i) {
    sites.splice(i, 1);
    save();
  }

  function exportSites() {
    const blob = new Blob([JSON.stringify(sites, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "sites.json";
    a.click();
    URL.revokeObjectURL(url);
  }

  function importSites() {
    document.getElementById("importFile").click();
  }

  document.getElementById("importFile").addEventListener("change", function() {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const imported = JSON.parse(e.target.result);
        if (Array.isArray(imported)) {
          sites.length = 0;
          imported.forEach(s => {
            sites.push({
              url: s.url,
              status: s.status || "Not checked yet",
              responseTime: s.responseTime || "N/A",
              lastChecked: s.lastChecked || "Never",
              history: Array.isArray(s.history) ? s.history : []
            });
          });
          save();
        }
      } catch {
        alert("Invalid JSON file");
      }
    };
    reader.readAsText(file);
  });

  function addHistoryEntry(site, status) {
    if (!Array.isArray(site.history)) site.history = [];

    const now = new Date().toLocaleString();
    const last = site.history[site.history.length - 1];

    if (last && last.status === status) return;

    site.history.push({ status, time: now });

    if (site.history.length > MAX_HISTORY) {
      site.history.splice(0, site.history.length - MAX_HISTORY);
    }

    if (Notification.permission === "granted") {
      new Notification(site.url, {
        body: `Status changed: ${status}`,
        icon: "https://monitor.richardkentgates.com/icon.png"
      });
    }
  }

  async function checkSite(site, index) {
    const start = performance.now();

    try {
      await fetch(site.url, { method: "GET", mode: "no-cors", cache: "no-store" });

      const end = performance.now();
      const seconds = ((end - start) / 1000).toFixed(2);

      const newStatus = "Reachable";
      if (sites[index].status !== newStatus) addHistoryEntry(sites[index], newStatus);

      sites[index].status = newStatus;
      sites[index].responseTime = `${seconds}s`;

    } catch {
      const newStatus = "Unreachable";
      if (sites[index].status !== newStatus) addHistoryEntry(sites[index], newStatus);

      sites[index].status = newStatus;
      sites[index].responseTime = "N/A";
    }

    sites[index].lastChecked = new Date().toLocaleString();
    save();
  }

  function toggleHistory(i) {
    const panel = document.getElementById("history-" + i);
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  }

  function render() {
    const container = document.getElementById("sites");
    container.innerHTML = "";

    sites.forEach((site, i) => {
      const historyHTML = site.history
        .map(h => `<div class="history-entry">${h.time} — ${h.status}</div>`)
        .join("");

      const div = document.createElement("div");
      div.className = "site" + (site.status === "Unreachable" ? " unreachable" : "");
      div.innerHTML = `
        <strong>${site.url}</strong>
        <div class="status">Status: ${site.status}</div>
        <div class="status">Response: ${site.responseTime}</div>
        <div class="last-check">Last checked: ${site.lastChecked}</div>

        <button class="history-btn" onclick="toggleHistory(${i})">History</button>
        <div class="history-panel" id="history-${i}">
          ${historyHTML || "<div class='history-entry'>No history</div>"}
        </div>

        <button class="remove-btn" onclick="removeSite(${i})">Remove</button>
      `;
      container.appendChild(div);
    });
  }

  async function checkAll() {
    for (let i = 0; i < sites.length; i++) {
      await checkSite(sites[i], i);
    }
  }

  setInterval(() => {
    countdown--;
    if (countdown <= 0) {
      countdown = POLL_INTERVAL;
      checkAll();
    }
    document.getElementById("countdown").textContent = `Next check in: ${countdown}s`;
  }, 1000);

  render();

  // Expose functions globally
  window.enableNotifications = enableNotifications;
  window.addSite = addSite;
  window.removeSite = removeSite;
  window.exportSites = exportSites;
  window.importSites = importSites;
  window.toggleHistory = toggleHistory;

});
</script>

</body>
</html>
